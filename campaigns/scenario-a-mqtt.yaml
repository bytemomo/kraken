id: scenario-a-mqtt
type: network

policy:
    safety:
        allow_aggressive: true
        require_max_duration: true

    runner:
        max_parallel_targets: 4
        defaults:
            connection_timeout: 1s
            max_reconnects: 3

scanners:
    - type: nmap
      nmap:
          ports: ["1883", "8883", "8884"]
          open_only: true
          timing: T3
          skip_host_discovery: false
          service_detect:
              enabled: true
              version: ALL

attack_trees_def_path: "./resources/scenario-a/attack-tree.yaml"

conduit_templates:
    - name: tcp
      kind: stream
      required_tags: ["protocol:tcp"]
      stack:
          - name: tcp

    - name: tls
      kind: stream
      required_tags: ["supports:tls"]
      stack:
          - name: tcp
          - name: tls
            params:
                skip_verify: true

tasks:
    - id: tls_version_check
      registry: "latest"
      required_tags: ["supports:tls", "protocol:mqtt"]
      max_duration: 30s
      exec:
          conduit_templates: [tls]
          params:
              min_version: "1.2"
              max_version: "1.3"

    - id: cert_inspect
      registry: "latest"
      required_tags: ["supports:tls", "protocol:mqtt"]
      max_duration: 30s
      exec:
          conduit_templates: [tls]
          params:
              warn_days: 30
              min_rsa_bits: 2048
              allow_sha1: false
              disallow_self_signed: true

    - id: mqtt_auth_check
      registry: "latest"
      required_tags: ["protocol:mqtt"]
      max_duration: 60s
      exec:
          conduit_templates: [tcp, tls]

    - id: mqtt_acl_probe
      registry: "latest"
      required_tags: ["protocol:mqtt"]
      max_duration: 120s
      exec:
          conduit_templates: [tcp, tls]
          params:
              creds_file: "./resources/scenario-a/profiles/common/test-credentials.txt"

    - id: mqtt-dict-attack
      type: native
      required_tags: ["protocol:mqtt", "protocol:tcp"]
      max_duration: 180s
      exec:
          conduit_templates: [tcp, tls]
          params:
              credentials:
                  - "admin:admin"
                  - "admin:admin123"
                  - "admin:password"
                  - "scada:scada"
                  - "scada:scada123"
                  - "operator:operator"
                  - "guest:guest"
                  - "test:test"
                  - "mqtt:mqtt"
                  - "root:root"

    - id: mqtt_sys_disclosure
      registry: "latest"
      required_tags: ["protocol:mqtt"]
      max_duration: 30s
      exec:
          conduit_templates: [tcp, tls]

    - id: mqtt-conformance-test
      type: native
      required_tags: ["protocol:mqtt", "protocol:tcp"]
      max_duration: 120s
      exec:
          conduit_templates: [tcp, tls]

    - id: mqtt_replay
      registry: "latest"
      required_tags: ["protocol:mqtt", "protocol:tcp"]
      max_duration: 60s
      aggressive: true
      exec:
          conduit_templates: [tcp, tls]
          params:
              sequence_num: "1"
              path0: "./modules/protocols/mqtt/abi/mqtt_replay/CVE-2024-8376.txt"

    - id: mqtt-boofuzz
      type: container
      required_tags: ["protocol:mqtt", "protocol:tcp"]
      max_duration: 2m
      aggressive: true
      exec:
          container:
              runtime: host
              image: python
              command: [
                "./modules/protocols/mqtt/container/boofuzz/boofuzz_poc.py",
                "fuzz",
              ]
